<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Personal Work — Christopher Wang</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --fg: #1a1a18;
    --fg2: #5a5a54;
    --fg3: #9a9a90;
    --bg: #f5f3ee;
    --bg2: #edeae2;
    --accent: #c85a2a;
    --card: #fff;
    --border: rgba(0,0,0,0.08);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; }

  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.5rem 4rem; position: sticky; top: 0;
    background: rgba(245,243,238,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); z-index: 100;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--fg); letter-spacing: -0.02em; text-decoration: none; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { font-size: 0.88rem; color: var(--fg2); text-decoration: none; letter-spacing: 0.02em; transition: color 0.2s; }
  .nav-links a:hover { color: var(--accent); }
  .nav-links a.active { color: var(--fg); font-weight: 500; }

  /* Page header */
  .page-header {
    max-width: 1100px; margin: 0 auto;
    padding: 3rem 4rem 2rem;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .header-left {}
  .section-label {
    font-size: 0.75rem; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem;
  }
  .page-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 4vw, 3.2rem);
    letter-spacing: -0.03em; line-height: 1.05;
  }
  .page-header p {
    font-size: 0.95rem; color: var(--fg2); font-weight: 300;
    margin-top: 0.75rem; max-width: 400px; line-height: 1.65;
  }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.85rem; color: var(--fg2); text-decoration: none;
    padding: 0.6rem 1.2rem; border-radius: 50px;
    border: 1px solid var(--border); background: var(--card);
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .back-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* Masonry gallery */
  .gallery-wrap {
    max-width: 1100px; margin: 0 auto;
    padding: 0 4rem 6rem;
  }

  .masonry {
    columns: 3; column-gap: 1rem;
  }

  .masonry-item {
    break-inside: avoid;
    margin-bottom: 1rem;
    border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border);
    cursor: zoom-in;
    background: var(--bg2);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .masonry-item:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.1); }
  .masonry-item img {
    width: 100%; display: block;
    transition: opacity 0.2s;
  }
  .masonry-item:hover img { opacity: 0.92; }

  /* Lightbox */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.88);
    align-items: center; justify-content: center;
    cursor: zoom-out;
    flex-direction: column; gap: 1rem;
  }
  #lightbox.open { display: flex; }

  #lightbox-img {
    max-width: 90vw; max-height: 85vh;
    object-fit: contain; border-radius: 8px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }

  #lightbox-caption {
    font-size: 0.85rem; color: rgba(255,255,255,0.5);
    letter-spacing: 0.04em;
  }

  .lightbox-close {
    position: fixed; top: 1.5rem; right: 2rem;
    font-size: 1.5rem; color: rgba(255,255,255,0.6);
    cursor: pointer; background: none; border: none;
    transition: color 0.2s; line-height: 1;
  }
  .lightbox-close:hover { color: #fff; }

  .lightbox-nav {
    position: fixed; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.1); border: none;
    color: #fff; font-size: 1.5rem; cursor: pointer;
    padding: 1rem 0.85rem; border-radius: 8px;
    transition: background 0.2s;
  }
  .lightbox-nav:hover { background: rgba(255,255,255,0.2); }
  #lightbox-prev { left: 1rem; }
  #lightbox-next { right: 1rem; }

  @media (max-width: 900px) {
    .masonry { columns: 2; }
  }
  @media (max-width: 700px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { gap: 1.2rem; }
    .page-header { padding: 2rem 1.5rem 1.5rem; flex-direction: column; align-items: flex-start; gap: 1.25rem; }
    .gallery-wrap { padding: 0 1.5rem 4rem; }
    .masonry { columns: 2; }
    #lightbox-prev { left: 0.25rem; }
    #lightbox-next { right: 0.25rem; }
  }
  @media (max-width: 480px) {
    .masonry { columns: 1; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Christopher Wang</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="character-concepts.html">Character Concepts</a></li>
    <li><a href="personal.html" class="active">Personal Work</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="header-left">
    <p class="section-label">Personal Work</p>
    <h1>Personal Work</h1>
    <p>A scroll through personal pieces, studies, and experiments. Click any image to view it full size.</p>
  </div>
  <a href="index.html" class="back-btn">← Back to home</a>
</div>

<div class="gallery-wrap">
  <div class="masonry" id="gallery">
    <div class="masonry-item" onclick="openLightbox(this)">
      <img src="images/wushu5.png" alt="Description" />
    </div>

    <!-- Example placeholders — replace src with your actual image paths -->
    <div class="masonry-item" onclick="openLightbox(this)">
      <img src="images/wushu3.png" alt="Personal work 1" />
    </div>

    <div class="masonry-item" onclick="openLightbox(this)">
      <img src="images/wushu2.png" alt="Personal work 2" />
    </div>

    <div class="masonry-item" onclick="openLightbox(this)">
      <img src="images/horse5.avif" alt="Personal work 3" />
    </div>

    <div class="masonry-item" onclick="openLightbox(this)">
      <img src="images/horse4.avif" alt="Personal work 4" />
    </div>

    <div class="masonry-item" onclick="openLightbox(this)">
      <img src="images/horse3.avif" alt="Personal work 5" />
    </div>

    <div class="masonry-item" onclick="openLightbox(this)">
      <img src="images/hoshiumi.jpeg" alt="Personal work 6" />
    </div>

  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav" id="lightbox-prev" onclick="changeImage(-1)">‹</button>
  <img id="lightbox-img" alt="" />
  <div id="lightbox-caption"></div>
  <button class="lightbox-nav" id="lightbox-next" onclick="changeImage(1)">›</button>
</div>

<script>
  const items = document.querySelectorAll('.masonry-item');
  let currentIndex = 0;

  function openLightbox(el) {
    const index = Array.from(items).indexOf(el);
    showImage(index);
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function showImage(index) {
    currentIndex = index;
    const img = items[index].querySelector('img');
    document.getElementById('lightbox-img').src = img.src;
    document.getElementById('lightbox-caption').textContent = img.alt || '';
  }

  function changeImage(dir) {
    let next = currentIndex + dir;
    if (next < 0) next = items.length - 1;
    if (next >= items.length) next = 0;
    showImage(next);
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  // Click outside image to close
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  // Keyboard navigation
  document.addEventListener('keydown', function(e) {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') changeImage(1);
    if (e.key === 'ArrowLeft') changeImage(-1);
  });
</script>

</body>
</html>
