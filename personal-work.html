<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Personal Work — Christopher Wang</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --fg: #1a1a18;
    --fg2: #5a5a54;
    --fg3: #9a9a90;
    --bg: #f5f3ee;
    --bg2: #edeae2;
    --accent: #c85a2a;
    --card: #fff;
    --border: rgba(0,0,0,0.08);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; }

  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.5rem 4rem; position: sticky; top: 0;
    background: rgba(245,243,238,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); z-index: 100;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--fg); letter-spacing: -0.02em; text-decoration: none; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { font-size: 0.88rem; color: var(--fg2); text-decoration: none; letter-spacing: 0.02em; transition: color 0.2s; }
  .nav-links a:hover { color: var(--accent); }
  .nav-links a.active { color: var(--fg); font-weight: 500; }

  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.85rem; color: var(--fg2); text-decoration: none;
    padding: 3rem 4rem 0;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent); }

  .page-header {
    max-width: 1100px; margin: 0 auto;
    padding: 2.5rem 4rem 0;
  }
  .section-label {
    font-size: 0.75rem; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem;
  }
  .page-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 4vw, 3.2rem);
    letter-spacing: -0.03em; line-height: 1.05;
    margin-bottom: 0.75rem;
  }
  .page-header p {
    font-size: 1rem; color: var(--fg2); font-weight: 300; line-height: 1.7;
    max-width: 480px; margin-bottom: 2.5rem;
  }

  .gallery-section {
    max-width: 1100px; margin: 0 auto;
    padding: 0 4rem 6rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .card {
    background: var(--card); border-radius: 16px; overflow: hidden;
    border: 1px solid var(--border); transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none; color: inherit; display: block;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.08); }

  .card-thumb {
    aspect-ratio: 4/3; overflow: hidden; background: var(--bg2);
  }
  .card-thumb img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.4s ease;
  }
  .card:hover .card-thumb img { transform: scale(1.04); }

  .card-thumb-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem;
  }
  .c1 { background: #e8e2f5; }
  .c2 { background: #e2f0e8; }
  .c3 { background: #f5e8e2; }

  .card-body { padding: 1.25rem; }
  .card-tag {
    font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--fg3); margin-bottom: 0.4rem;
  }
  .card-body h3 { font-size: 1.05rem; font-weight: 500; color: var(--fg); margin-bottom: 0.35rem; }
  .card-body p { font-size: 0.85rem; color: var(--fg2); line-height: 1.55; font-weight: 300; }

  @media (max-width: 700px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { gap: 1.2rem; }
    .back-link { padding: 2rem 1.5rem 0; }
    .page-header, .gallery-section { padding-left: 1.5rem; padding-right: 1.5rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
  }
</style>
</head>
<body>

  <ul class="nav-links">

  <h1>Personal Work</h1>
  <p>A collection of personal studies, fan art, designs.</p>
</div>

</div>

</html>
